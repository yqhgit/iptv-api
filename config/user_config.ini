[Settings]
# 模板文件路径
source_file = config/user_demo.txt
# 结果文件路径
final_file = output/user_result.txt

# ===== 分辨率过滤 - 只保留1080p及以上 =====
open_filter_resolution = True
# 最小分辨率：1920x1080 (1080p)
min_resolution = 1920x1080
# 最大分辨率：3840x2160 (4K)
max_resolution = 3840x2160

# ===== 速率过滤 - 保证稳定性 =====
open_filter_speed = True
# 最小速率 1.0 M/s，确保流畅播放
min_speed = 1.0
# 不同分辨率的最低速率要求
resolution_speed_map = 1920x1080:1.0,2560x1440:1.5,3840x2160:2.0

# ===== 测速设置 =====
open_speed_test = True
# 测速超时时长
speed_test_timeout = 15
# 同时测速数量
speed_test_limit = 10

# ===== 单个频道接口数量 =====
urls_limit = 3

# ===== EPG节目单 =====
open_epg = True

# ===== 台标 =====
open_m3u_result = True
logo_type = png

# ===== 不显示接口信息（部分播放器不支持） =====
open_url_info = False

# ===== 显示更新时间 =====
open_update_time = True
update_time_position = top

# ===== IPv4/IPv6 =====
ipv_type = all
ipv_type_prefer = ipv4

# ===== 数据源开关 =====
open_local = True
open_subscribe = True
open_history = True

# ===== 时区 =====
time_zone = Asia/Shanghai
